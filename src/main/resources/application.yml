management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers

  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000/realms/combotto}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:9000/realms/combotto/protocol/openid-connect/certs}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.combotto.controlplane.*"
        spring.json.value.default.type: com.combotto.controlplane.model.EvidenceEnvelope

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/combotto_control_plane}
    username: ${SPRING_DATASOURCE_USERNAME:devuser}
    password: ${SPRING_DATASOURCE_PASSWORD:REPLACE_ME_LOCAL_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:migration

  jackson:
    datatype:
      datetime:
        WRITE_DATES_AS_TIMESTAMPS: false

server:
  port: 8080
