services:
  kafka:
    image: apache/kafka-native:latest
    container_name: kafka
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-9092}:9092"   # host apps connect here (Spring Boot)
    environment:
      # Two listeners: HOST for localhost apps, DOCKER for containers (kafka-ui)
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # KRaft single-node settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  control-plane-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-plane-api
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8080}:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-combotto_control_plane}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-devuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      AUTH_ISSUER_URI: http://localhost:${KEYCLOAK_HOST_PORT:-9000}/realms/combotto
      AUTH_JWK_SET_URI: http://keycloak:8080/realms/combotto/protocol/openid-connect/certs
    depends_on:
      - kafka
      - postgres
      - keycloak

  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: kafka-ui
    profiles:
      - tools
    ports:
      - "127.0.0.1:${KAFKA_UI_HOST_PORT:-8081}:8081"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka

  postgres:
    image: postgres:16
    container_name: combotto-control-plane-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-combotto_control_plane}
      POSTGRES_USER: ${POSTGRES_USER:-devuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - combotto_control_plane_postgres:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: combotto-keycloak
    ports:
      - "127.0.0.1:${KEYCLOAK_HOST_PORT:-9000}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_READ_CLIENT_ID: ${KEYCLOAK_READ_CLIENT_ID:-control-plane-read-cli}
      KEYCLOAK_READ_CLIENT_SECRET: ${KEYCLOAK_READ_CLIENT_SECRET:-local-dev-read-secret}
      KEYCLOAK_READ_USERNAME: ${KEYCLOAK_READ_USERNAME:-local-reader}
      KEYCLOAK_READ_PASSWORD: ${KEYCLOAK_READ_PASSWORD:-local-reader-password}
      KEYCLOAK_READ_EMAIL: ${KEYCLOAK_READ_EMAIL:-local-reader@example.com}
      KEYCLOAK_WRITE_CLIENT_ID: ${KEYCLOAK_WRITE_CLIENT_ID:-control-plane-write-cli}
      KEYCLOAK_WRITE_CLIENT_SECRET: ${KEYCLOAK_WRITE_CLIENT_SECRET:-local-dev-write-secret}
      KEYCLOAK_WRITE_USERNAME: ${KEYCLOAK_WRITE_USERNAME:-local-writer}
      KEYCLOAK_WRITE_PASSWORD: ${KEYCLOAK_WRITE_PASSWORD:-local-writer-password}
      KEYCLOAK_WRITE_EMAIL: ${KEYCLOAK_WRITE_EMAIL:-local-writer@example.com}
    volumes:
      - ./keycloak:/opt/keycloak/data/local-config
    entrypoint:
      - /bin/sh
      - -c
    command:
      - sh /opt/keycloak/data/local-config/scripts/render-realm.sh && exec /opt/keycloak/bin/kc.sh start-dev --import-realm

volumes:
  combotto_control_plane_postgres:
