services:
  kafka:
    image: apache/kafka-native:latest
    container_name: kafka
    ports:
      - "9092:9092"   # host apps connect here (Spring Boot)
    environment:
      # Two listeners: HOST for localhost apps, DOCKER for containers (kafka-ui)
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT

      # KRaft single-node settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  control-plane-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control-plane-api
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/combotto_control_plane
      SPRING_DATASOURCE_USERNAME: combotto
      SPRING_DATASOURCE_PASSWORD: combotto
    depends_on:
      - kafka
      - postgres

  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: kafka-ui
    ports:
      - "8081:8081"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka

  postgres:
    image: postgres:16
    container_name: combotto-control-plane-postgres
    environment:
      POSTGRES_DB: combotto_control_plane
      POSTGRES_USER: combotto
      POSTGRES_PASSWORD: combotto
    ports:
      - "5432:5432"
    volumes:
      - combotto_control_plane_postgres:/var/lib/postgresql/data

volumes:
  combotto_control_plane_postgres:
